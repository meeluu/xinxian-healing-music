# 心弦 · Cloudflare Pages 配置
#
# 部署结构：
# - 静态站点：build/web（Flutter Web 产物）
# - Functions：functions/（LLM 情绪解析网关）
#
# 本地开发：
#   wrangler pages dev build/web
#   （自动读取 .dev.vars 中的环境变量）
#
# 部署：
#   wrangler pages deploy build/web --project-name=xinxian-healing-music
#
# 注意：OPENAI_API_KEY 不写在此文件中！
#   生产环境 → Cloudflare Dashboard → Pages → Settings → Environment variables（设为 Secret）
#   本地开发 → .dev.vars 文件（已 gitignore）
#
# P4.4-4: 同理，MINIMAX_API_KEY / REPLICATE_API_TOKEN / STABLE_AUDIO_API_KEY 均为 Secret，
#   不写入本文件，只在 Dashboard → Secret 中管理。

name = "xinxian-healing-music"
compatibility_date = "2024-09-01"
pages_build_output_dir = "build/web"

# ─── 非敏感环境变量（敏感的 API Key 在 Dashboard Secret 配置）───
[vars]
OPENAI_BASE_URL = "https://api.deepseek.com"
OPENAI_MODEL = "deepseek-v4-flash"
ENABLE_LLM = "true"

# P4.4-4 / P4.4-5 / P4 第四批: AI 音乐生成 provider 选择（非敏感，可入 wrangler.toml）
# 敏感凭证 MINIMAX_API_KEY / REPLICATE_API_TOKEN / STABLE_AUDIO_API_KEY 在 Dashboard Secret 管理
#
# 三重门保护（P4 第四批确立）：
#   门1: MUSIC_GENERATION_PROVIDER = "minimax_music"（本文件）
#   门2: MUSIC_GENERATION_REAL_CALLS_ENABLED = "true"（本文件，默认 false，仅手动测试时临时改 true）
#   门3: 请求体 manualTest === true（curl 手动传入，前端默认不传）
#   另：MINIMAX_API_KEY 必须在 Cloudflare Production Secret 中配置，否则 factory 降级为 mock
# 只有四者同时满足才真实调用 MiniMax API，避免误扣费。
MUSIC_GENERATION_PROVIDER = "minimax_music"
# 默认 false：线上默认不真实调用；手动 curl 测试时临时改 true 并传 manualTest=true
# ──────────────────────────────────────────────────────────────────────
# P4 MiniMax 真实生成链路受控测试（P4-minimax-real-test-1）手动测试流程：
# 1. 临时将本行改为 MUSIC_GENERATION_REAL_CALLS_ENABLED = "true"
# 2. 执行 wrangler pages deploy build/web --project-name=xinxian-healing-music
# 3. curl POST /api/generate-music（请求体必须包含 manualTest=true，详见 README 6.15.5）
# 4. 测试完成后立即将本行改回 "false"
# 5. 再次 wrangler pages deploy 重新部署
# 6. curl GET /api/health 确认 realCallsEnabled=false / hasMinimaxKey=true
# ──────────────────────────────────────────────────────────────────────
# 重要：仓库默认必须保持 "false"，避免线上持续可被调用产生费用。
#      测试期间的 "true" 状态只在本地或临时部署中存在，不应提交到 git。
# ──────────────────────────────────────────────────────────────────────
# P4-minimax-real-test-1 手动实测已完成（2026-07-19）：真实调用成功拿到 audioHex
# 已恢复为 "false"，仓库默认安全
# ──────────────────────────────────────────────────────────────────────
# P4-temp-audio-playback-1 线上真实试听测试（2026-07-23）：临时改为 "true"
# 测试完成后必须立即改回 "false" 并重新部署
MUSIC_GENERATION_REAL_CALLS_ENABLED = "true"
# P4.4-5: MiniMax Music-2.0 真实调用测试参数（非敏感）
# - MINIMAX_MUSIC_MODEL：模型名（Music-2.0）
# - MUSIC_GENERATION_MAX_DURATION_SECONDS：单次测试目标时长上限（120s = 2 分钟）
# 注意：MiniMax Music-2.0 API 本身不强制 duration 参数，此处仅作内部约束，
#       实际时长通过短 prompt + 不传 lyrics 控制。
MINIMAX_MUSIC_MODEL = "music-2.0"
MUSIC_GENERATION_MAX_DURATION_SECONDS = "120"

# ─── M7: Cloudflare D1 数据库 binding（匿名云端反馈采集）───
# 创建命令：npx wrangler d1 create xinxian-feedback
# 初始化 schema：npx wrangler d1 execute xinxian-feedback --remote --file=./schema/feedback.sql
# Function 内通过 env.xinxian_feedback.prepare('INSERT INTO ...') 访问
[[d1_databases]]
binding = "xinxian_feedback"
database_name = "xinxian-feedback"
database_id = "a3019d62-a2d3-4eb5-9c34-b345858f81e2"

# ─── P4-generated-audio-playback-1: Cloudflare R2 binding（AI 生成音频落地存储）───
# 用途：MiniMax 同步接口返回 audio hex，后端将其转为 mp3 bytes 上传到 R2，
#       再通过 /api/generated-music?key={storageKey} 代理读取并流式返回给前端播放。
#       R2 bucket 为私有访问，不开放公开 URL，统一走 /api/generated-music 受控代理。
#
# 创建 bucket 命令（在 Cloudflare Dashboard 或本地 wrangler 执行）：
#   npx wrangler r2 bucket create xinxian-generated-music
#
# object key 格式：generated-music/{yyyyMMdd}/{sessionId}-{traceId}.mp3
# content-type：audio/mpeg
#
# 安全：
# - 不在此处写入任何 secret（MINIMAX_API_KEY 在 Dashboard Secret 管理）
# - R2 bucket 默认私有，不开启公开访问
# - 前端不直接访问 R2，统一通过 /api/generated-music 代理（受 CORS 白名单保护）
#
# 注意：如果 R2 bucket 尚未创建，Cloudflare 部署时会校验 bucket 是否存在并导致部署失败。
# P4-temp-audio-playback-1（2026-07-23）：本批暂不依赖 R2，临时注释掉 R2 binding。
#   - 后端代码会检测 env.GENERATED_MUSIC_BUCKET 是否存在，缺失时走 audioDataUrl 临时播放路径
#   - 前端通过 audioDataUrl（base64 dataUrl）直接播放，不需要 R2
#   - 将来做 P4 持久化批次（历史歌曲/分享链接）时，先创建 bucket 再取消注释：
#       npx wrangler r2 bucket create xinxian-generated-music
#       然后取消下方 [[r2_buckets]] 段的注释
# [[r2_buckets]]
# binding = "GENERATED_MUSIC_BUCKET"
# bucket_name = "xinxian-generated-music"
